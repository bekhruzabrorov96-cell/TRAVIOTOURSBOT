services:
  - type: worker
    name: travio-tours-bot
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: MANAGER_CHAT_ID
        sync: false
      - key: LEADS_FILE
        value: work/leads.jsonl
      - key: SESSIONS_FILE
        value: work/sessions.json
